name: Release Desktop App

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.2) - must match version in source files'
        required: true
        type: string

permissions:
  contents: read

env:
  ELIXIR_VERSION: "1.19"
  # Pin to exact version available on Beam Machine (Burrito's ERTS source).
  # Beam Machine may lag behind the latest OTP patch releases.
  OTP_VERSION: "28.4"
  MIX_ENV: prod
  AVRDUDE_VERSION: "8.1"

jobs:
  # Verify version in source files matches the release tag
  verify-version:
    name: Verify Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get and verify version
        id: get-version
        env:
          EVENT_NAME: ${{ github.event_name }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Get expected version from tag or input
          if [ "$EVENT_NAME" = "release" ]; then
            EXPECTED="$TAG_NAME"
          else
            EXPECTED="$INPUT_VERSION"
          fi
          # Remove 'v' prefix if present
          EXPECTED="${EXPECTED#v}"

          echo "Expected version: $EXPECTED"

          # Extract versions from source files
          MIX_VERSION=$(grep -E 'version: "[0-9]+\.[0-9]+\.[0-9]+"' mix.exs | head -1 | sed 's/.*version: "\([^"]*\)".*/\1/')
          TAURI_VERSION=$(grep -E '"version": "[0-9]+\.[0-9]+\.[0-9]+"' tauri/src-tauri/tauri.conf.json | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')
          CARGO_VERSION=$(grep -E '^version = "[0-9]+\.[0-9]+\.[0-9]+"' tauri/src-tauri/Cargo.toml | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')

          echo "mix.exs version: $MIX_VERSION"
          echo "tauri.conf.json version: $TAURI_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"

          # Verify all versions match
          FAILED=0
          if [ "$MIX_VERSION" != "$EXPECTED" ]; then
            echo "::error::mix.exs version ($MIX_VERSION) does not match expected ($EXPECTED)"
            FAILED=1
          fi
          if [ "$TAURI_VERSION" != "$EXPECTED" ]; then
            echo "::error::tauri.conf.json version ($TAURI_VERSION) does not match expected ($EXPECTED)"
            FAILED=1
          fi
          if [ "$CARGO_VERSION" != "$EXPECTED" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match expected ($EXPECTED)"
            FAILED=1
          fi

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "::error::Version mismatch! Run './scripts/update-version.sh $EXPECTED' and commit before releasing."
            exit 1
          fi

          echo "All versions match: $EXPECTED"
          echo "version=$EXPECTED" >> $GITHUB_OUTPUT

  build-elixir:
    name: Build Elixir (${{ matrix.target }})
    needs: [verify-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows_x86_64
            binary_name: trenino_desktop_windows_x86_64.exe
            tauri_target: x86_64-pc-windows-msvc

          - os: ubuntu-22.04
            target: linux_x86_64
            binary_name: trenino_desktop_linux_x86_64
            tauri_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}
          version-type: strict

      - name: Install Windows build dependencies
        if: runner.os == 'Windows'
        run: choco install 7zip -y

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Mix dependencies
        uses: actions/cache@v5
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build assets
        run: mix assets.deploy

      - name: Workaround circuits_uart Makefile location for Burrito
        if: runner.os == 'Linux'
        run: ln -sf src/Makefile deps/circuits_uart/Makefile

      - name: Build Elixir release
        run: mix release trenino_desktop
        env:
          BURRITO_TARGET: ${{ matrix.target }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Upload Elixir binary
        uses: actions/upload-artifact@v7
        with:
          name: elixir-${{ matrix.target }}
          path: burrito_out/${{ matrix.binary_name }}
          retention-days: 1

  build-keystroke:
    name: Build Keystroke (${{ matrix.target }})
    needs: [verify-version]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows_x86_64
            tauri_target: x86_64-pc-windows-msvc
            binary_ext: ".exe"

          - os: ubuntu-22.04
            target: linux_x86_64
            tauri_target: x86_64-unknown-linux-gnu
            binary_ext: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxdo-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/keystroke -> target

      - name: Build keystroke utility
        working-directory: tauri/keystroke
        run: cargo build --release

      - name: Upload keystroke binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: keystroke-${{ matrix.target }}
          path: tauri/keystroke/target/release/keystroke.exe
          retention-days: 1

      - name: Upload keystroke binary (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v7
        with:
          name: keystroke-${{ matrix.target }}
          path: tauri/keystroke/target/release/keystroke
          retention-days: 1

  download-avrdude:
    name: Download avrdude (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows_x86_64
            avrdude_url: https://github.com/avrdudes/avrdude/releases/download/v8.1/avrdude-v8.1-windows-x64.zip
            avrdude_binary: avrdude.exe
            extract_cmd: unzip -o

          - target: linux_x86_64
            avrdude_url: https://github.com/avrdudes/avrdude/releases/download/v8.1/avrdude_v8.1_Linux_64bit.tar.gz
            avrdude_binary: avrdude
            extract_cmd: tar xzf

    steps:
      - name: Download avrdude
        run: |
          curl -L -o avrdude-archive.zip "${{ matrix.avrdude_url }}"
          ${{ matrix.extract_cmd }} avrdude-archive.zip
          # Find and copy the avrdude binary
          find . -name "${{ matrix.avrdude_binary }}" -type f | head -1 | xargs -I {} cp {} avrdude-binary
          # Also copy avrdude.conf if it exists
          find . -name "avrdude.conf" -type f | head -1 | xargs -I {} cp {} avrdude.conf || true
          ls -la

      - name: Upload avrdude binary
        uses: actions/upload-artifact@v7
        with:
          name: avrdude-${{ matrix.target }}
          path: |
            avrdude-binary
            avrdude.conf
          retention-days: 1

  download-vcredist:
    name: Download VC++ Redistributable
    runs-on: ubuntu-latest
    steps:
      - name: Cache VC++ Redistributable
        id: cache-vcredist
        uses: actions/cache@v5
        with:
          path: vc_redist.x64.exe
          key: vcredist-x64-2022

      - name: Download VC++ Redistributable
        if: steps.cache-vcredist.outputs.cache-hit != 'true'
        run: curl -L -o vc_redist.x64.exe https://aka.ms/vs/17/release/vc_redist.x64.exe

      - name: Upload VC++ Redistributable
        uses: actions/upload-artifact@v7
        with:
          name: vcredist
          path: vc_redist.x64.exe
          retention-days: 1

  build-tauri:
    name: Build Tauri (${{ matrix.target }})
    needs: [verify-version, build-elixir, build-keystroke, download-avrdude, download-vcredist]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-2022
            target: windows_x86_64
            elixir_binary: trenino_desktop_windows_x86_64.exe
            tauri_target: x86_64-pc-windows-msvc
            tauri_args: ""
            avrdude_ext: ".exe"

          - os: ubuntu-22.04
            target: linux_x86_64
            elixir_binary: trenino_desktop_linux_x86_64
            tauri_target: x86_64-unknown-linux-gnu
            tauri_args: "--bundles appimage"
            avrdude_ext: ""

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Elixir binary
        uses: actions/download-artifact@v8
        with:
          name: elixir-${{ matrix.target }}
          path: tauri/src-tauri/binaries

      - name: Download avrdude
        uses: actions/download-artifact@v8
        with:
          name: avrdude-${{ matrix.target }}
          path: tauri/src-tauri/binaries/avrdude-download

      - name: Download keystroke
        uses: actions/download-artifact@v8
        with:
          name: keystroke-${{ matrix.target }}
          path: tauri/src-tauri/binaries/keystroke-download

      - name: Download VC++ Redistributable
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v8
        with:
          name: vcredist
          path: tauri/src-tauri/resources

      - name: Prepare binaries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Prepare Elixir backend binary
          Move-Item -Path "tauri/src-tauri/binaries/${{ matrix.elixir_binary }}" `
                    -Destination "tauri/src-tauri/binaries/trenino_backend-${{ matrix.tauri_target }}.exe"

          # Prepare avrdude binary
          Move-Item -Path "tauri/src-tauri/binaries/avrdude-download/avrdude-binary" `
                    -Destination "tauri/src-tauri/binaries/avrdude-${{ matrix.tauri_target }}.exe"

          # Copy avrdude.conf if it exists
          if (Test-Path "tauri/src-tauri/binaries/avrdude-download/avrdude.conf") {
            Copy-Item -Path "tauri/src-tauri/binaries/avrdude-download/avrdude.conf" `
                      -Destination "tauri/src-tauri/binaries/"
          }

          # Prepare keystroke binary
          Move-Item -Path "tauri/src-tauri/binaries/keystroke-download/keystroke.exe" `
                    -Destination "tauri/src-tauri/binaries/keystroke-${{ matrix.tauri_target }}.exe"

          # Clean up download folders
          Remove-Item -Recurse -Force "tauri/src-tauri/binaries/avrdude-download"
          Remove-Item -Recurse -Force "tauri/src-tauri/binaries/keystroke-download"

          Get-ChildItem tauri/src-tauri/binaries/

      - name: Prepare binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          # Prepare Elixir backend binary
          mv "tauri/src-tauri/binaries/${{ matrix.elixir_binary }}" \
             "tauri/src-tauri/binaries/trenino_backend-${{ matrix.tauri_target }}"
          chmod +x "tauri/src-tauri/binaries/trenino_backend-${{ matrix.tauri_target }}"

          # Prepare avrdude binary
          mv "tauri/src-tauri/binaries/avrdude-download/avrdude-binary" \
             "tauri/src-tauri/binaries/avrdude-${{ matrix.tauri_target }}"
          chmod +x "tauri/src-tauri/binaries/avrdude-${{ matrix.tauri_target }}"

          # Copy avrdude.conf if it exists
          if [ -f "tauri/src-tauri/binaries/avrdude-download/avrdude.conf" ]; then
            cp "tauri/src-tauri/binaries/avrdude-download/avrdude.conf" \
               "tauri/src-tauri/binaries/"
          fi

          # Prepare keystroke binary
          mv "tauri/src-tauri/binaries/keystroke-download/keystroke" \
             "tauri/src-tauri/binaries/keystroke-${{ matrix.tauri_target }}"
          chmod +x "tauri/src-tauri/binaries/keystroke-${{ matrix.tauri_target }}"

          # Clean up download folders
          rm -rf "tauri/src-tauri/binaries/avrdude-download"
          rm -rf "tauri/src-tauri/binaries/keystroke-download"

          ls -la tauri/src-tauri/binaries/

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Create placeholder for Windows-only resources
        if: runner.os == 'Linux'
        run: |
          mkdir -p tauri/src-tauri/resources
          touch tauri/src-tauri/resources/vc_redist.x64.exe

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tauri/package-lock.json

      - name: Install frontend dependencies
        working-directory: tauri
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tauriScript: npx tauri
          args: ${{ matrix.tauri_args }}
          tagName: v${{ needs.verify-version.outputs.version }}
          releaseName: "trenino v${{ needs.verify-version.outputs.version }}"
          releaseBody: "See the release notes for details."
          releaseDraft: false
          prerelease: false
