name: Weekly Documentation Review

on:
  schedule:
    # Run every Friday at 9 AM UTC
    - cron: '0 9 * * 5'
  workflow_dispatch:
    # Allow manual triggering for testing

jobs:
  weekly-docs-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for commit analysis

      - name: Collect and filter last week's commits
        id: collect-commits
        run: |
          set -e

          # Create temp files for commit data
          COMMITS_FILE="/tmp/recent_commits.txt"
          FILES_FILE="/tmp/changed_files.txt"

          echo "## Commits from the last 7 days" > "$COMMITS_FILE"
          echo "" >> "$COMMITS_FILE"

          echo "## Changed files from the last 7 days" > "$FILES_FILE"
          echo "" >> "$FILES_FILE"

          # Get commits from last 7 days
          SINCE_DATE=$(date -u -d '7 days ago' '+%Y-%m-%d' 2>/dev/null || date -u -v-7d '+%Y-%m-%d')

          # Paths to exclude (dependency, CI, test-only files)
          EXCLUDE_PATTERNS=(
            "package-lock.json"
            "yarn.lock"
            "mix.lock"
            "Cargo.lock"
            "Cargo.toml"
            ".github/workflows/"
            "test/"
            "_test.exs"
          )

          FILTERED_COUNT=0
          TOTAL_COUNT=0

          # Process each commit from the last 7 days
          while read -r commit_hash; do
            TOTAL_COUNT=$((TOTAL_COUNT + 1))

            # Get files changed in this commit
            CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "$commit_hash")

            # Check if commit only touches excluded files
            SHOULD_SKIP=true
            for file in $CHANGED_FILES; do
              FILE_SHOULD_SKIP=false
              for pattern in "${EXCLUDE_PATTERNS[@]}"; do
                if [[ "$file" == *"$pattern"* ]]; then
                  FILE_SHOULD_SKIP=true
                  break
                fi
              done

              # If at least one file is not excluded, include the commit
              if [ "$FILE_SHOULD_SKIP" = false ]; then
                SHOULD_SKIP=false
                break
              fi
            done

            # Include commit if it has relevant changes
            if [ "$SHOULD_SKIP" = false ]; then
              FILTERED_COUNT=$((FILTERED_COUNT + 1))

              # Get commit details
              COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$commit_hash")
              COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an" "$commit_hash")
              COMMIT_DATE=$(git log -1 --pretty=format:"%ai" "$commit_hash")

              # Add to commits file
              echo "### Commit: $commit_hash" >> "$COMMITS_FILE"
              echo "**Author**: $COMMIT_AUTHOR" >> "$COMMITS_FILE"
              echo "**Date**: $COMMIT_DATE" >> "$COMMITS_FILE"
              echo "**Message**: $COMMIT_MSG" >> "$COMMITS_FILE"
              echo "" >> "$COMMITS_FILE"

              # Add changed files
              echo "**Files changed in $commit_hash**:" >> "$FILES_FILE"
              for file in $CHANGED_FILES; do
                echo "  - $file" >> "$FILES_FILE"
              done
              echo "" >> "$FILES_FILE"
            fi
          done < <(git log --since="$SINCE_DATE" --pretty=format:"%H")

          echo "Total commits in last 7 days: $TOTAL_COUNT"
          echo "Commits after filtering: $FILTERED_COUNT"

          # Set output for next step
          echo "commit_count=$FILTERED_COUNT" >> $GITHUB_OUTPUT
          echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT

          # Show what we collected
          echo "=== Commits File ==="
          cat "$COMMITS_FILE"
          echo ""
          echo "=== Changed Files ==="
          cat "$FILES_FILE"

      - name: Run Claude Documentation Review
        if: steps.collect-commits.outputs.commit_count > 0
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Configure allowed tools for documentation work
          claude_args: '--allowed-tools Bash Read Write Edit Glob Grep'

          prompt: |
            # Weekly Documentation Review Task

            You are a technical writer conducting a deep weekly documentation review for the Trenino project — an Elixir/Phoenix application with a Tauri frontend that interfaces physical hardware controls with Train Sim World.

            ## Audience Definitions

            Every documentation file serves one of two audiences. Keep this in mind for tone, depth, and what to include:

            - **End users**: People setting up and using Trenino with their hardware and Train Sim World. They care about how to install, configure, and use features. They don't care about internal architecture or code patterns. Write clearly, assume no Elixir knowledge.
            - **Developers**: Contributors to the Trenino codebase. They care about architecture, design decisions, code patterns, and how systems interconnect. Assume Elixir/Phoenix familiarity.

            | File | Audience | Purpose |
            |------|----------|---------|
            | `README.md` | Both (end-user first) | Project overview, quick start, feature summary |
            | `CHANGELOG.md` | Both | Release history (Keep a Changelog format) |
            | `docs/getting-started.md` | End users | Installation and first-run guide |
            | `docs/hardware-setup.md` | End users | Physical hardware configuration |
            | `docs/train-configuration.md` | End users | Train profile setup and binding |
            | `docs/mcp-setup.md` | End users | MCP integration setup |
            | `docs/lua-scripting.md` | End users | Writing Lua scripts for automation |
            | `docs/TSW_API_GUIDE.md` | Both | Train Sim World API reference |
            | `docs/architecture.md` | Developers | System architecture and design |
            | `docs/development.md` | Developers | Development setup and workflow |
            | `docs/control_auto_suggestion.md` | Developers | Auto-suggestion system design |
            | `docs/lever_input_mapping_architecture.md` | Developers | Lever mapping internals |
            | `docs/features/bldc-levers.md` | Both | BLDC lever feature documentation |
            | `CLAUDE.md` | Developers (AI agents) | Coding guidelines for AI assistants |
            | `AGENTS.md` | Developers (AI agents) | Agent-specific instructions |

            ## Context

            Commit data from the past week has been prepared:
            - `/tmp/recent_commits.txt` — Filtered commits (excluding deps, CI, test-only)
            - `/tmp/changed_files.txt` — Files changed in those commits

            ## Your Task

            ### Phase 1: Understand what changed

            1. Read `/tmp/recent_commits.txt` and `/tmp/changed_files.txt`
            2. Read the actual source code of significantly changed files to understand what was built, not just commit messages
            3. Categorize: new features, behavior changes, new configuration options, new APIs, bug fixes, UX improvements

            ### Phase 2: Audit existing documentation

            For each documentation file in the table above:

            1. **Read it fully**
            2. **Check for gaps**: Are recently added features documented? Are removed features still mentioned? Are there placeholders or TODOs?
            3. **Check for accuracy**: Do code examples still work? Are configuration options current? Do described workflows match the actual implementation?
            4. **Check for quality**: Is the writing clear for its target audience? Are there missing examples where they'd help? Are complex features explained well enough? Could a new user/developer actually follow this?
            5. **Check for completeness**: Are there features in the codebase that have no documentation at all? Look at the source code, not just commits.

            ### Phase 3: Improve documentation

            Go beyond just reflecting commits. Actively improve the docs:

            - **Add missing documentation** for features that exist in code but aren't documented
            - **Improve explanations** that are too terse or assume too much context
            - **Add practical examples** where abstract descriptions aren't enough (e.g., example configurations, sample Lua scripts, common workflows)
            - **Fix stale content** — remove references to features that no longer exist, update outdated instructions
            - **Improve structure** — reorganize sections if the current flow is confusing, add cross-references between related docs
            - **Add troubleshooting tips** for common issues you can identify from the codebase (error handling paths, common misconfiguration)
            - **Update CHANGELOG.md** — add entries under `## [Unreleased]` using categories: Added, Changed, Deprecated, Removed, Fixed, Security

            ### Phase 4: Create PR

            - ONLY create a PR if you actually made documentation changes
            - If no meaningful updates are needed, report your findings and exit
            - Branch: `docs/weekly-review-$(date +%Y-%m-%d)`
            - Commit message: `docs: weekly documentation review for $(date +%Y-%m-%d)`

            PR body format:
            ```
            ## Summary
            [2-3 sentence overview of what was improved and why]

            ## Changes by document
            - **file.md**: [what changed and why]
            - ...

            ## Commits reviewed
            - `hash` message
            - ...

            ## Notes for reviewer
            [Anything that needs human judgment — tone, accuracy of examples, whether a section should be split into its own doc, etc.]

            ---
            🤖 Automated by Claude Code weekly documentation review
            ```

            Use `gh pr create` to create the PR.

            ## Guidelines

            - **Write for the audience**: End-user docs should be friendly and practical. Developer docs should be precise and technical.
            - **Be substantive**: Don't make trivial wording tweaks. Every change should meaningfully help a reader.
            - **Read the code**: Don't guess what a feature does from commit messages alone. Read the implementation to write accurate docs.
            - **Show, don't just tell**: Prefer concrete examples over abstract descriptions, especially in end-user docs.
            - **Respect existing style**: Match the voice and formatting conventions already established in each file.
            - **Create new docs if needed**: If a significant feature has zero documentation, create a new file in `docs/` or `docs/features/` and link to it from README.md.
            - **ONLY create PR if you made changes**: Do not create empty PRs.

            Start by reading the commit data, then systematically audit each documentation file.

      - name: Summary
        if: always()
        run: |
          echo "=== Weekly Documentation Review Summary ==="
          echo "Total commits in last 7 days: ${{ steps.collect-commits.outputs.total_count }}"
          echo "Commits reviewed (after filtering): ${{ steps.collect-commits.outputs.commit_count }}"

          if [ "${{ steps.collect-commits.outputs.commit_count }}" -eq 0 ]; then
            echo "No relevant commits to review - skipped Claude analysis"
          else
            echo "Claude documentation review completed"
          fi
