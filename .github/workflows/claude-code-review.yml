name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Skip draft PRs, PRs by claude[bot] (circular reviews), and dependabot PRs
    # (handled by dependabot-analyzer workflow). Dependabot cannot access secrets
    # in pull_request events, so this would always fail.
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login != 'claude[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Start with: `gh pr diff ${{ github.event.pull_request.number }}` and `gh pr view ${{ github.event.pull_request.number }}`

            This is an Elixir/Phoenix project. Apply the project coding guidelines:
            - Struct arguments must be pattern matched: `def fn(%MyStruct{} = s)`
            - Float values must be rounded to 2 decimal places (`Float.round(v, 2)`)
            - Protocol message encode/decode must use atom-based structs (no integer type fields)
            - Avoid untyped maps; prefer structs or documented map types

            Focus on:
            1. **Correctness** — bugs, wrong logic, edge cases not handled
            2. **Project guidelines** — violations of the rules above
            3. **Security** — input validation, injection risks
            4. **Testing** — missing coverage for new behaviour

            Skip style nits. Only flag issues that matter.

            Post a single review comment using:
            `gh pr comment ${{ github.event.pull_request.number }} --body "..."`

            Use a heredoc to handle special characters. Format as markdown with
            sections for each concern. If there's nothing significant to flag, say so briefly.
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*)"

