name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    # Skip draft PRs, PRs by claude[bot] (circular reviews), and dependabot PRs
    # (handled by dependabot-analyzer workflow). Dependabot cannot access secrets
    # in pull_request events, so this would always fail.
    if: |
      !github.event.pull_request.draft &&
      github.event.pull_request.user.login != 'claude[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a code review of this pull request. Focus on:

            1. **Code Quality** - Clean code, proper error handling, readability
            2. **Security** - Potential vulnerabilities, input validation
            3. **Performance** - Bottlenecks, inefficient queries
            4. **Testing** - Adequate test coverage, edge cases

            Use inline comments for specific issues. Use a top-level comment for
            general observations. Be concise.
          claude_args: |
            --allowedTools "Bash(gh pr diff:*),Bash(gh pr view:*)"

